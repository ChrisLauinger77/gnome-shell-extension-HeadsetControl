name: ESLint

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]

jobs:
    eslint:
        name: Run eslint scanning
        runs-on: ubuntu-latest
        permissions:
            contents: read
            security-events: write
            # Required for private repositories by github/codeql-action/upload-sarif
            actions: read
        steps:
            - name: Checkout
              uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

            - name: Install
              run: npm ci

            - name: Lint
              env:
                  SARIF_ESLINT_IGNORE_SUPPRESSED: "true"
              run: npx eslint .
                  --format @microsoft/eslint-formatter-sarif
                  --output-file eslint-results.sarif
              continue-on-error: true

            - name: Report
              uses: github/codeql-action/upload-sarif@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4
              with:
                  sarif_file: eslint-results.sarif
                  wait-for-processing: true

    shexli:
        name: Run Shexli scanning
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - name: Checkout
              uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

            - name: Set up Python
              uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7
              with:
                  python-version: "3.14"

            - name: Install Shexli
              run: pip install --no-cache-dir "tree-sitter<0.26" shexli

            - name: Lint
              shell: bash
              run: |
                  set +e
                  shexli "$GITHUB_WORKSPACE/HeadsetControl@lauinger-clan.de" 2>&1 | tee shexli-output.txt
                  status=${PIPESTATUS[0]}

                  {
                      echo "## Shexli results"
                      echo '```text'
                      cat shexli-output.txt
                      echo '```'
                  } >> "$GITHUB_STEP_SUMMARY"

                  exit "$status"
